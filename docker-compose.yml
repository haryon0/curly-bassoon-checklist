services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # Persist uploaded photos and generated PDFs across restarts
      - ./data/uploads:/app/uploads
      - ./data/generated:/app/generated
    expose:
      - "5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # host:container — host 8989 because port 80 is already used on the VPS
      - "8989:80"
