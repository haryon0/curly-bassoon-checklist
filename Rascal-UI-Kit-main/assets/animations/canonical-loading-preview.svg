<?xml version="1.0" encoding="UTF-8"?>
<!--
  Canonical Loading Preview — Rascal Republic visual DNA.
  Mirrors okr.rascalrepublic.com boot screen.

  Used as the reference image in docs/ANIMATIONS.md and SKILL.md.
  The live implementation is templates/components/LoadingSpinner.tsx
  (pre-bound: templates/components/RascalLoadingSpinner.tsx).

  Self-animating via SMIL so the preview spins in any browser without JS.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#eff6ff"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Logo placeholder — two mountain peaks (simplified Rascal mark) -->
  <g transform="translate(400 280)" stroke="#011132" stroke-width="3" fill="none" stroke-linejoin="round">
    <path d="M-40 30 L-10 -25 L20 30 Z"/>
    <path d="M-5 30 L25 -25 L55 30 Z" opacity="0.55"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Spinning ring (blue, partial arc) -->
  <g transform="translate(400 280)">
    <circle r="55" fill="none" stroke="#bfdbfe" stroke-width="4"/>
    <g>
      <circle r="55" fill="none" stroke="#2563eb" stroke-width="4"
              stroke-dasharray="86.4 259.2" stroke-linecap="round" transform="rotate(-90)"/>
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="360" dur="1s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Headline -->
  <text x="400" y="400" text-anchor="middle"
        font-family="'Aptos','Inter','Segoe UI Variable','Segoe UI',system-ui,sans-serif"
        font-size="22" font-weight="600" fill="#1c1917" letter-spacing="-0.01em">
    Loading OKR Tracker
  </text>

  <!-- Subtitle -->
  <text x="400" y="432" text-anchor="middle"
        font-family="'Aptos','Inter','Segoe UI Variable','Segoe UI',system-ui,sans-serif"
        font-size="14" fill="#57534e">
    Please wait while we authenticate…
  </text>
</svg>
