<?xml version="1.0" encoding="UTF-8"?>
<!--
  Brand Loading Comparison — three-up reference.
  Shows how the LoadingSpinner adapts ring color + background gradient
  per brand: Rascal corporate blue, Rinjani turquoise, Samara sunset gold.

  See docs/BRAND_COLORS.md for the rationale.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bg-rascal"  x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/><stop offset="50%" stop-color="#ffffff"/><stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
    <linearGradient id="bg-rinjani" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F4F4"/><stop offset="50%" stop-color="#FAF7F2"/><stop offset="100%" stop-color="#E8DCC4" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bg-samara"  x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8EFD9"/><stop offset="50%" stop-color="#FCFAF5"/><stop offset="100%" stop-color="#CFD4DB" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- ╭──── Rascal Republic ────╮ -->
  <g transform="translate(0 0)">
    <rect x="20" y="20" width="360" height="460" rx="16" fill="url(#bg-rascal)" stroke="#e7e5e4" stroke-width="1"/>
    <g transform="translate(200 220)" stroke="#011132" stroke-width="2.5" fill="none" stroke-linejoin="round">
      <path d="M-30 22 L-7 -19 L15 22 Z"/>
      <path d="M-4 22 L19 -19 L41 22 Z" opacity="0.55"/>
    </g>
    <g transform="translate(200 220)">
      <circle r="45" fill="none" stroke="#bfdbfe" stroke-width="3.5"/>
      <g>
        <circle r="45" fill="none" stroke="#2563eb" stroke-width="3.5" stroke-dasharray="70.7 212" stroke-linecap="round" transform="rotate(-90)"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </g>
    </g>
    <text x="200" y="330" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="18" font-weight="600" fill="#1c1917">Loading OKR Tracker</text>
    <text x="200" y="358" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="12" fill="#57534e">Please wait while we authenticate…</text>
    <text x="200" y="430" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="11" fill="#a8a29e" letter-spacing="0.05em">RASCAL REPUBLIC · CORPORATE</text>
  </g>

  <!-- ╭──── Rinjani Bay ────╮ -->
  <g transform="translate(400 0)">
    <rect x="20" y="20" width="360" height="460" rx="16" fill="url(#bg-rinjani)" stroke="#E5DBC8" stroke-width="1"/>
    <g transform="translate(200 220)" stroke="#007D80" stroke-width="2.5" fill="none" stroke-linejoin="round">
      <circle cx="0" cy="-5" r="18" opacity="0.85"/>
      <path d="M-22 22 L0 -2 L22 22 Z" opacity="0.55"/>
    </g>
    <g transform="translate(200 220)">
      <circle r="45" fill="none" stroke="#9FD4D4" stroke-width="3.5"/>
      <g>
        <circle r="45" fill="none" stroke="#0E8A8A" stroke-width="3.5" stroke-dasharray="70.7 212" stroke-linecap="round" transform="rotate(-90)"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </g>
    </g>
    <text x="200" y="330" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="18" font-weight="600" fill="#1A2826">Loading Rinjani Concierge</text>
    <text x="200" y="358" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="12" fill="#5C6A68">Please wait while we authenticate…</text>
    <text x="200" y="430" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="11" fill="#8FA09D" letter-spacing="0.05em">RINJANI BAY · BOUTIQUE VILLA</text>
  </g>

  <!-- ╭──── Samara Lombok ────╮ -->
  <g transform="translate(800 0)">
    <rect x="20" y="20" width="360" height="460" rx="16" fill="url(#bg-samara)" stroke="#EDE5D2" stroke-width="1"/>
    <g transform="translate(200 220)" stroke="#324720" stroke-width="2.5" fill="none" stroke-linejoin="round">
      <path d="M-25 18 Q0 -22 25 18 Z" opacity="0.85"/>
      <line x1="-30" y1="22" x2="30" y2="22"/>
    </g>
    <g transform="translate(200 220)">
      <circle r="45" fill="none" stroke="#EBD9A8" stroke-width="3.5"/>
      <g>
        <circle r="45" fill="none" stroke="#D4A648" stroke-width="3.5" stroke-dasharray="70.7 212" stroke-linecap="round" transform="rotate(-90)"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </g>
    </g>
    <text x="200" y="330" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="18" font-weight="600" fill="#1F1B16">Loading Samara Booking</text>
    <text x="200" y="358" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="12" fill="#6B6259">Please wait while we authenticate…</text>
    <text x="200" y="430" text-anchor="middle" font-family="'Aptos','Inter','Segoe UI',sans-serif" font-size="11" fill="#A89F92" letter-spacing="0.05em">SAMARA LOMBOK · BOUTIQUE VILLA</text>
  </g>
</svg>
