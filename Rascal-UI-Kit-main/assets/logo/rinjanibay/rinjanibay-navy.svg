<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="240" height="120" role="img" aria-label="Rinjani Bay — Sumbawa Indonesia">
  <!-- Stylised thumbprint/fingerprint mark -->
  <g transform="translate(95,8)" fill="none" stroke="#011132" stroke-width="2" stroke-linecap="round">
    <ellipse cx="25" cy="22" rx="22" ry="18"/>
    <ellipse cx="25" cy="22" rx="17" ry="13"/>
    <ellipse cx="25" cy="22" rx="12" ry="9"/>
    <ellipse cx="25" cy="22" rx="7" ry="5"/>
    <line x1="3" y1="35" x2="6" y2="40"/>
    <line x1="44" y1="35" x2="47" y2="40"/>
    <line x1="11" y1="42" x2="13" y2="46"/>
    <line x1="37" y1="42" x2="39" y2="46"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(0,72)">
    <text x="120" y="0" text-anchor="middle" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="20" font-weight="500" letter-spacing="4" fill="#011132">RINJANI BAY</text>
    <text x="120" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="400" letter-spacing="3" fill="#011132">SUMBAWA &#xb7; INDONESIA</text>
  </g>
