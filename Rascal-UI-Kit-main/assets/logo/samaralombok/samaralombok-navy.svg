<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100" role="img" aria-label="Samara Lombok">
  <!-- Primary wordmark — refined serif -->
  <text x="120" y="48" text-anchor="middle" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="32" font-weight="500" letter-spacing="6" fill="#011132">SAMARA</text>
  <!-- Horizontal rule above subtitle -->
  <line x1="100" y1="60" x2="140" y2="60" stroke="#011132" stroke-width="0.75"/>
  <!-- Subtitle -->
  <text x="120" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" letter-spacing="5" fill="#011132">LOMBOK</text>
</svg>
